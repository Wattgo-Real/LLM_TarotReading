<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Cam - 高質感相機</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Viewport -->
        <div class="viewfinder-container">
            <video id="video" autoplay playsinline></video>
            <div id="compatibility-placeholder" class="compat-placeholder" style="display: none;">
                <div class="compat-icon">📷</div>
                <div class="compat-title">相機相容模式</div>
                <div class="compat-desc">點擊下方「拍攝照片」即可開啟相機拍照</div>
            </div>
            <div class="shutter-flash" id="flash"></div>
            
            <!-- UI Overlays -->
            <div class="top-bar">
                <div class="status-indicator">
                    <span class="dot"></span>
                    <span id="status-text">相機就緒</span>
                </div>
            </div>

            <!-- Tarot Question Overlay -->
            <div class="tarot-overlay">
                <div class="question-box">
                    <div class="settings-bar">
                        <label class="toggle-item">
                            <input type="checkbox" id="use-self-model-toggle">
                            <span>使用 Gemma 4 模型</span>
                        </label>
                        <label class="toggle-item" id="use-split-inference-label">
                            <input type="checkbox" id="use-split-inference-toggle">
                            <span>啟用多代理人系統</span>
                        </label>
                    </div>
                    <textarea id="question-input" placeholder="請問你想問塔羅牌什麼問題？" rows="2"></textarea>
                    <div class="action-buttons">
                        <button id="send-question-btn" class="glass-btn primary">送出問題</button>
                        <button id="capture-btn" class="glass-btn primary">拍攝照片</button>
                        <button id="view-result-btn" class="glass-btn secondary">觀看解答</button>
                    </div>
                </div>
            </div>


        </div>

        <!-- Hidden Canvas for Capture -->
        <canvas id="canvas" style="display: none;"></canvas>
        
        <!-- Fallback for Non-HTTPS (System Camera) -->
        <input type="file" accept="image/*" capture="camera" id="camera-input" style="display: none;">

        <!-- Result Modal -->
        <div id="result-modal" class="modal">
            <div class="modal-content result-content">
                <div class="modal-header">
                    <h2>塔羅牌解答</h2>
                    <span class="close-result">&times;</span>
                </div>
                <div id="result-text" class="result-text-area">
                    正在獲取解答，請稍候...
                </div>
            </div>
        </div>


    </div>
    <script src="app.js?v=1.0.1"></script>
</body>
</html>
